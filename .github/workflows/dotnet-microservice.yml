name: .NET Microservice CI/CD

on:
  workflow_call:
    inputs:
      service-name:
        description: Service name (used as ECR repo name and ECS service identifier)
        required: true
        type: string
      environment:
        description: Target deployment environment
        required: true
        type: string
      sonar-project-key:
        description: SonarQube project key
        required: true
        type: string
      aws-region:
        description: AWS region
        required: false
        type: string
        default: us-east-1
      dotnet-version:
        description: .NET SDK version
        required: false
        type: string
        default: '8.x'
      project-path:
        description: Path to solution or project file
        required: false
        type: string
        default: '.'
      dockerfile:
        description: Path to Dockerfile
        required: false
        type: string
        default: Dockerfile
      s3-reports-bucket:
        description: S3 bucket for scan reports (audit account)
        required: false
        type: string
        default: msi-security-scan-reports
      vars-yaml-path:
        description: Path to vars.yaml in terraform-infra to update with the new image tag (e.g. ms-qa/us-east-1/cubiic-user-service/vars.yaml). When set, gitops-ecs-update writes to this file instead of a JSON task definition.
        required: false
        type: string
        default: ''
    secrets:
      AWS_ACCOUNT_ID:
        required: true
      SONAR_TOKEN:
        required: true
      SONAR_HOST_URL:
        required: true
      NUGET_TOKEN:
        description: PAT for private NuGet feeds (optional — only needed for services using private packages)
        required: false

concurrency:
  group: deploy-${{ inputs.service-name }}-${{ inputs.environment }}
  cancel-in-progress: false

jobs:
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/github-actions-terraform
          aws-region: ${{ inputs.aws-region }}
      - name: Secret scan
        uses: membersolutionsinc/msi-github-actions/.github/actions/secret-scan@main
      - name: SonarQube scan
        uses: membersolutionsinc/msi-github-actions/.github/actions/sonarqube-scan@main
        with:
          sonar-project-key: ${{ inputs.sonar-project-key }}
          app-type: dotnet
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
      - name: Semgrep SAST
        uses: membersolutionsinc/msi-github-actions/.github/actions/semgrep-sast@main
        with:
          config: p/csharp
          service-name: ${{ inputs.service-name }}
          s3-reports-bucket: ${{ inputs.s3-reports-bucket }}
          aws-region: ${{ inputs.aws-region }}
      - name: OWASP Dependency Check
        uses: membersolutionsinc/msi-github-actions/.github/actions/dotnet-vuln-scan@main
        with:
          project-name: ${{ inputs.service-name }}
          service-name: ${{ inputs.service-name }}
          s3-reports-bucket: ${{ inputs.s3-reports-bucket }}
          aws-region: ${{ inputs.aws-region }}

  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    needs: security-scan
    steps:
      - uses: actions/checkout@v4
      - name: Build
        uses: membersolutionsinc/msi-github-actions/.github/actions/dotnet-build@main
        with:
          dotnet-version: ${{ inputs.dotnet-version }}
          project-path: ${{ inputs.project-path }}
          nuget-token: ${{ secrets.NUGET_TOKEN }}
      - name: Test
        uses: membersolutionsinc/msi-github-actions/.github/actions/dotnet-test@main
        with:
          project-path: ${{ inputs.project-path }}

  build-and-push-image:
    name: Build & Push Image
    runs-on: ubuntu-latest
    needs: build-and-test
    permissions:
      id-token: write
      contents: read
    outputs:
      image-tag: ${{ steps.push.outputs.image-tag }}
      full-image-uri: ${{ steps.push.outputs.full-image-uri }}
    steps:
      - uses: actions/checkout@v4
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/github-actions-terraform
          aws-region: ${{ inputs.aws-region }}
      - name: Push to ECR
        id: push
        uses: membersolutionsinc/msi-github-actions/.github/actions/ecr-push@main
        with:
          aws-account-id: ${{ secrets.AWS_ACCOUNT_ID }}
          aws-region: ${{ inputs.aws-region }}
          image-name: ${{ inputs.service-name }}
          dockerfile: ${{ inputs.dockerfile }}
          build-args: |
            NUGET_TOKEN=${{ secrets.NUGET_TOKEN }}
      - name: Attach SBOM
        uses: membersolutionsinc/msi-github-actions/.github/actions/sbom-attach@main
        with:
          image-uri: ${{ steps.push.outputs.full-image-uri }}
          service-name: ${{ inputs.service-name }}
          image-tag: ${{ steps.push.outputs.image-tag }}

  deploy:
    name: Deploy (${{ inputs.environment }})
    runs-on: ubuntu-latest
    needs: build-and-push-image
    permissions:
      id-token: write
      contents: read
    environment:
      name: ${{ inputs.environment }}
    steps:
      - uses: actions/checkout@v4
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/github-actions-terraform
          aws-region: ${{ inputs.aws-region }}
      - name: GitOps ECS update
        uses: membersolutionsinc/msi-github-actions/.github/actions/gitops-ecs-update@main
        with:
          service-name: ${{ inputs.service-name }}
          environment: ${{ inputs.environment }}
          image-tag: ${{ needs.build-and-push-image.outputs.image-tag }}
          vars-yaml-path: ${{ inputs.vars-yaml-path }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
