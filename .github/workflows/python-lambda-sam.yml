name: Python Lambda SAM CI/CD

on:
  workflow_call:
    inputs:
      service-name:
        description: Service name (used for stack name and S3 paths)
        required: true
        type: string
      environment:
        description: Target deployment environment
        required: true
        type: string
      sonar-project-key:
        description: SonarQube project key
        required: true
        type: string
      aws-region:
        description: AWS region
        required: false
        type: string
        default: us-east-1
      python-version:
        description: Python version for SAM build
        required: false
        type: string
        default: '3.12'
      stack-name:
        description: CloudFormation stack name (defaults to service-name-environment)
        required: false
        type: string
        default: ''
      sam-s3-bucket:
        description: S3 bucket for SAM deployment artifacts
        required: false
        type: string
        default: ''
      parameter-overrides:
        description: Space-separated SAM parameter overrides
        required: false
        type: string
        default: ''
      s3-reports-bucket:
        description: S3 bucket for scan reports (audit account)
        required: false
        type: string
        default: msi-security-scan-reports
    secrets:
      AWS_ACCOUNT_ID:
        required: true
      SONAR_TOKEN:
        required: true
      SONAR_HOST_URL:
        required: true

concurrency:
  group: deploy-${{ inputs.service-name }}-${{ inputs.environment }}
  cancel-in-progress: false

jobs:
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python-version }}
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/github-actions-terraform
          aws-region: ${{ inputs.aws-region }}
      - name: Secret scan
        uses: membersolutionsinc/msi-github-actions/.github/actions/secret-scan@main
      - name: SonarQube scan
        uses: membersolutionsinc/msi-github-actions/.github/actions/sonarqube-scan@main
        with:
          sonar-project-key: ${{ inputs.sonar-project-key }}
          app-type: python
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
      - name: Semgrep SAST
        uses: membersolutionsinc/msi-github-actions/.github/actions/semgrep-sast@main
        with:
          config: p/python
          service-name: ${{ inputs.service-name }}
          s3-reports-bucket: ${{ inputs.s3-reports-bucket }}
          aws-region: ${{ inputs.aws-region }}
      - name: pip-audit SCA
        shell: bash
        run: |
          pip install pip-audit --quiet
          pip-audit -r requirements.txt --format json --output pip-audit-report.json || true
      - name: Upload pip-audit artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pip-audit-report-${{ github.run_id }}
          path: pip-audit-report.json
      - name: Upload pip-audit to S3
        uses: membersolutionsinc/msi-github-actions/.github/actions/upload-scan-report@main
        if: always()
        with:
          report-path: pip-audit-report.json
          report-type: pip-audit
          service-name: ${{ inputs.service-name }}
          bucket: ${{ inputs.s3-reports-bucket }}
          aws-region: ${{ inputs.aws-region }}

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: security-scan
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python-version }}
          cache: pip
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov
      - name: Run tests
        run: pytest tests/ -v --tb=short --cov=. --cov-report=xml
      - name: Upload coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage.xml

  deploy:
    name: Deploy (${{ inputs.environment }})
    runs-on: ubuntu-latest
    needs: test
    permissions:
      id-token: write
      contents: read
    environment:
      name: ${{ inputs.environment }}
    steps:
      - uses: actions/checkout@v4
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/github-actions-terraform
          aws-region: ${{ inputs.aws-region }}
      - name: SAM deploy
        uses: membersolutionsinc/msi-github-actions/.github/actions/sam-deploy@main
        with:
          stack-name: ${{ inputs.stack-name != '' && inputs.stack-name || format('{0}-{1}', inputs.service-name, inputs.environment) }}
          s3-bucket: ${{ inputs.sam-s3-bucket }}
          aws-region: ${{ inputs.aws-region }}
          environment: ${{ inputs.environment }}
          python-version: ${{ inputs.python-version }}
          parameter-overrides: ${{ inputs.parameter-overrides }}
